org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.parallel=true
org.gradle.daemon=false
android.useAndroidX=true
android.enableJetifier=true
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=true
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=true
# Fix: NDK 28 + AGP 8.11 no macOS ARM64 falha ao fazer strip de debug symbols
# das bibliotecas nativas (Sentry NDK, jni, speech_to_text).
# Esta flag desabilita a etapa de strip/verificação de símbolos NDK.
android.experimental.enableNdkSymbolVerification=false
android.enableLibDbgSymbolStripping=false
