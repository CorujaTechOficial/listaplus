  dynamic_color: ^1.8.1
  lottie: ^3.3.0
  quick_actions: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  test: ^1.25.0
  flutter_lints: ^5.0.0
  build_runner: ^2.4.7
